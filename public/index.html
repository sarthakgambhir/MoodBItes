<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoodBites — Recipes for How You Feel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['Georgia', 'serif'],
              sans: ['system-ui', 'Segoe UI', 'sans-serif'],
            },
            colors: {
              cream: '#faf7f2',
              terracotta: '#c45c3e',
              sage: '#6b8f71',
              ink: '#2d2926',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="min-h-screen bg-cream text-ink font-sans antialiased">
    <div class="max-w-3xl mx-auto px-4 py-10 sm:py-14">
      <header class="text-center mb-10">
        <p class="text-terracotta font-medium tracking-wide uppercase text-sm mb-2">
          MoodBites
        </p>
        <h1 class="font-display text-4xl sm:text-5xl text-ink mb-3">
          What are you craving?
        </h1>
        <p class="text-ink/70 text-lg max-w-md mx-auto">
          Pick your mood and we will suggest a recipe that matches how you feel.
        </p>
      </header>

      <section id="mood-section" aria-label="Select your mood">
        <h2 class="sr-only">Select your mood</h2>
        <div
          id="mood-grid"
          class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4"
        ></div>
      </section>

      <section
        id="recipe-section"
        class="hidden mt-10"
        aria-live="polite"
        aria-label="Recipe recommendation"
      >
        <div
          class="recipe-card bg-white rounded-2xl shadow-lg border border-ink/5 overflow-hidden"
        >
          <div class="bg-gradient-to-br from-terracotta/10 to-sage/10 px-6 py-5 border-b border-ink/5">
            <button
              id="back-btn"
              type="button"
              class="text-sm text-ink/60 hover:text-terracotta transition mb-3 flex items-center gap-1"
            >
              <span aria-hidden="true">←</span> Choose another mood
            </button>
            <p id="recipe-mood-badge" class="inline-flex items-center gap-1.5 text-sm font-medium text-terracotta bg-white/80 px-3 py-1 rounded-full mb-2"></p>
            <h2 id="recipe-title" class="font-display text-2xl sm:text-3xl text-ink"></h2>
            <p id="recipe-description" class="text-ink/70 mt-2"></p>
            <p id="recipe-prep" class="text-sm text-sage font-medium mt-2"></p>
          </div>

          <div class="px-6 py-6 space-y-6">
            <div>
              <h3 class="font-display text-lg text-ink mb-3">Ingredients</h3>
              <ul id="recipe-ingredients" class="space-y-2 text-ink/80"></ul>
            </div>
            <div>
              <h3 class="font-display text-lg text-ink mb-3">Instructions</h3>
              <ol id="recipe-instructions" class="space-y-3 text-ink/80 list-decimal list-inside"></ol>
            </div>
          </div>

          <div class="px-6 py-5 bg-cream/80 border-t border-ink/5 flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
            <p id="remaining-hint" class="text-sm text-ink/50"></p>
            <button
              id="new-recipe-btn"
              type="button"
              class="inline-flex justify-center items-center gap-2 bg-terracotta hover:bg-terracotta/90 text-white font-medium px-5 py-2.5 rounded-xl transition shadow-sm"
            >
              <span aria-hidden="true">🔄</span> Show me another recipe
            </button>
          </div>
        </div>
      </section>

      <div
        id="loading"
        class="hidden fixed inset-0 bg-ink/20 backdrop-blur-sm flex items-center justify-center z-50"
        role="status"
        aria-label="Loading recipe"
      >
        <div class="bg-white rounded-2xl px-8 py-6 shadow-xl flex items-center gap-3">
          <div class="spinner w-6 h-6 border-2 border-terracotta/30 border-t-terracotta rounded-full"></div>
          <span class="text-ink font-medium">Finding your recipe...</span>
        </div>
      </div>

      <div
        id="toast"
        class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-ink text-cream text-sm px-4 py-3 rounded-xl shadow-lg z-50 max-w-sm text-center"
        role="alert"
      ></div>
    </div>

    <script src="/js/app.js"></script>
  </body>
</html>
